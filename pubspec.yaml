name: image_to_flutter
description: "Separate objects from any image using MobileSAM on-device and generate Flutter code."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # File picking
  file_picker: ^8.0.3

  # Path / storage
  path_provider: ^2.1.3
  path: ^1.9.0

  # Settings persistence
  shared_preferences: ^2.2.3

  # Image processing in Dart (crop, resize, encode PNG)
  image: ^4.1.7

  # ONNX Runtime — runs MobileSAM on-device, no server needed
  onnxruntime: ^1.4.1

  # MediaPipe Tasks Vision — on-device image segmentation fallback
  # and interactive segmentation support
  google_mlkit_segmentation: ^0.2.0

  # HTTP only used to download model on first run if not bundled
  dio: ^5.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/models/
